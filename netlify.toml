
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Istruisce lo scanner di segreti di Netlify a ignorare queste chiavi.
  # Queste chiavi sono progettate per essere pubbliche nel browser.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_UPLOADCARE_PUBLIC_KEY,GEMINI_API_KEY"
  # Disabilita la scansione 'intelligente' che rileva i valori delle chiavi, per evitare che la build fallisca.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
